<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Background rounded square -->
  <rect width="48" height="48" rx="11" fill="#0f0f18"/>

  <!-- Selected element box (top-left, representing a UI element being clicked) -->
  <rect x="7" y="8" width="22" height="14" rx="3" fill="#1e1e35" stroke="#7c3aed" stroke-width="1.5"/>

  <!-- Selection highlight dot on corner -->
  <circle cx="7" cy="8" r="2" fill="#7c3aed"/>
  <circle cx="29" cy="8" r="2" fill="#7c3aed"/>
  <circle cx="7" cy="22" r="2" fill="#7c3aed"/>
  <circle cx="29" cy="22" r="2" fill="#7c3aed"/>

  <!-- Cursor arrow (bottom-right, pointing at the element) -->
  <path d="M24 28 L24 43 L28 39 L31 45 L33.5 44 L30.5 38 L36 38 Z"
        fill="white" stroke="#0f0f18" stroke-width="1" stroke-linejoin="round"/>

  <!-- Small pencil/edit dot indicator -->
  <circle cx="34" cy="27" r="3.5" fill="#a78bfa"/>
  <path d="M33 26.2 L34.8 26.2 L35.5 27 L33.7 28.8 L33 28 Z" fill="white" opacity="0.8"/>
</svg>
